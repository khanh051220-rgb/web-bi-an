<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi cậu món quà bí mật 💖</title>
    <style>
        /* GIỮ NGUYÊN CSS GỐC VÀ THÊM HỌA TIẾT */
        body { 
            background: #fff0f5; 
            background-image: radial-gradient(#ffccd5 1px, transparent 1px);
            background-size: 20px 20px; /* Thêm họa tiết chấm bi nền */
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 10px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            background: white; 
            padding: 15px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(255,105,180,0.3); 
            text-align: center; 
            width: 100%; 
            max-width: 500px;
            border: 2px solid #ffccd5;
        }
        h2 { font-size: 1.2rem; color: #ff6b81; margin-bottom: 15px; }
        video { 
            width: 100%; 
            height: auto; 
            border-radius: 20px; 
            border: 3px solid #ffccd5;
            display: block;
        }
        #quiz-overlay { 
            display: none; 
            margin-top: 15px; 
            padding: 20px; 
            background: #fff5f7; 
            border-radius: 20px; 
            border: 2px dashed #ff6b81; 
        }
        input { 
            padding: 15px; 
            width: 80%; 
            border: 2px solid #ffccd5; 
            border-radius: 15px; 
            font-size: 1.1rem;
            outline: none; 
            margin: 10px 0; 
        }
        button { 
            padding: 15px 30px; 
            background: #ff6b81; 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 1rem;
            cursor: pointer; 
            font-weight: bold; 
            width: 85%;
        }
        /* THÊM KHUNG VIDEO MẮT BÃO */
        .final-video { width: 100%; margin-top: 20px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <h2>🎁 Món quà bất ngờ cho cậu</h2>
    <video id="unboxVideo" controls playsinline>
        <source src="Messenger_creation_7ACF07CC-939F-4586-A360-6E0919F50592.mp4" type="video/mp4">
    </video>

    <div id="quiz-overlay">
        <h3 id="question-text">Giải câu này để xem tiếp nha:</h3>
        <input type="number" id="answer" placeholder="Nhập đáp án...">
        <br>
        <button onclick="checkAnswer()">Gửi đáp án</button>
    </div>
</div>

<script>
    const video = document.getElementById('unboxVideo');
    const overlay = document.getElementById('quiz-overlay');
    const questionText = document.getElementById('question-text');
    const container = document.getElementById('main-container');
    
    const stopTime = 4; 
    const quizData = [
        { q: "5 + 5 = ?", a: 10 }, { q: "12 * 2 = ?", a: 24 },
        { q: "100 - 20 = ?", a: 80 }, { q: "15 + 15 = ?", a: 30 },
        { q: "50 / 2 = ?", a: 25 }, { q: "9 * 9 = ?", a: 81 },
        { q: "7 + 8 = ?", a: 15 }, { q: "100 / 4 = ?", a: 25 },
        { q: "12 + 13 = ?", a: 25 }, { q: "10 * 10 = ?", a: 100 }
    ];

    let current = 0;

    video.addEventListener('timeupdate', () => {
        if (video.currentTime >= stopTime && !video.paused) {
            video.pause();
            overlay.style.display = 'block';
            questionText.innerText = quizData[current].q;
        }
    });

    function checkAnswer() {
        const val = document.getElementById('answer').value;
        if (parseInt(val) === quizData[current].a) {
            current++;
            document.getElementById('answer').value = '';
            
            if (current < quizData.length) {
                questionText.innerText = quizData[current].q;
            } else {
                // ĐOẠN NÀY ĐỂ NHÚNG VIDEO MẮT BÃO VÀO THAY VÌ CHUYỂN TRANG
                container.innerHTML = `
                    <h2>Tặng cậu Mắt Bão - Tọi 🎶</h2>
                    <iframe class="final-video" height="315" src="https://www.youtube.com/watch?v=qxLkN1G7n5A" frameborder="0" allowfullscreen></iframe>
                    <p style="margin-top:10px; color:#ff6b81; font-weight:bold;">Hy vọng cậu thích bài này! 💖</p>
                `;
            }
        } else {
            alert("Sai rồi, thử lại nhé! 😋");
        }
    }
</script>
</body>
</html>
