<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món quà bí mật 💖</title>
    <style>
        body { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; position: relative; }
        .container { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 500px; z-index: 1; }
        h2 { color: #ff4757; font-size: 1.5rem; margin-bottom: 20px; }
        video, iframe { width: 100%; max-width: 100%; border-radius: 20px; border: 4px solid #fff; display: block; margin: 0 auto; }
        #quiz-overlay { display: none; margin-top: 20px; }
        input { padding: 12px; width: 80%; border: 2px solid #ffccd5; border-radius: 15px; font-size: 1.1rem; text-align: center; }
        button { padding: 12px 25px; background: #ff4757; color: white; border: none; border-radius: 15px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .heart { position: absolute; color: #ff4757; font-size: 20px; z-index: 0; animation: float 5s linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <h2>🎁 Món quà cho cậu</h2>
    <video id="unboxVideo" controls playsinline>
        <source src="Messenger_creation_7ACF07CC-939F-4586-A360-6E0919F50592.mp4" type="video/mp4">
    </video>

    <div id="quiz-overlay">
        <h3 id="question-text">Giải câu này để xem tiếp nha:</h3>
        <input type="number" id="answer" placeholder="Đáp án...">
        <br>
        <button onclick="checkAnswer()">Gửi đáp án</button>
    </div>
</div>

<script>
    // Hiệu ứng trái tim
    function createHeart() {
        const heart = document.createElement('div');
        heart.innerHTML = '❤️';
        heart.className = 'heart';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 2 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
    setInterval(createHeart, 800);

    const video = document.getElementById('unboxVideo');
    const overlay = document.getElementById('quiz-overlay');
    const questionText = document.getElementById('question-text');
    const container = document.getElementById('main-content');

    // DANH SÁCH CÂU HỎI VÀ ĐÁP ÁN
    const quizData = [
        { q: "5 + 5 = ?", a: 10 },
        { q: "10 + 10 = ?", a: 20 }
    ];
    let current = 0;

    video.addEventListener('timeupdate', () => {
        if (video.currentTime >= 10 && !video.paused) {
            video.pause();
            overlay.style.display = 'block';
            questionText.innerText = quizData[current].q;
        }
    });

    function checkAnswer() {
        const val = document.getElementById('answer').value;
        if (parseInt(val) === quizData[current].a) {
            current++;
            document.getElementById('answer').value = '';
            
            if (current < quizData.length) {
                questionText.innerText = quizData[current].q;
            } else {
                container.innerHTML = `
                    <h2>Bất ngờ nè! 🎶</h2>
                    <iframe src="https://www.youtube.com/embed/n4r4F3pD0oE" frameborder="0" allowfullscreen></iframe>
                    <p style="margin-top:15px; color:#ff4757;">Mắt Bão - Tọi 💓</p>
                `;
            }
        } else {
            alert("Sai rồi, thử lại nhé! 😋");
        }
    }
</script>
</body>
</html>
